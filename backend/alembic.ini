# alembic.ini — Alembic configuration for chatbot-app backend
# The script_location points to the migrations/ directory relative to this file.
# DATABASE_URL is read from the environment (set in .env or docker-compose).

[alembic]
script_location = migrations
prepend_sys_path = .

# Use DATABASE_URL from environment; override here only for local dev if needed
# sqlalchemy.url = postgresql://ai_user:ai_pass@localhost:5432/personal_ai

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
